databases:
  - name: stockpilot-db
    plan: free
    databaseName: stockpilot
    user: stockpilot_user

services:
  # AI Service — deploy first
  - type: web
    name: stockpilot-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8000

  # Backend — deploy second
  - type: web
    name: stockpilot-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockpilot-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 3001

  # Frontend — deploy last
  - type: web
    name: stockpilot-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
